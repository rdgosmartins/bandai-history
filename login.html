<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — [YOKO] One Piece TCG - History Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="skull">&#9760;&#65039;</span>
            <h1>[YOKO] One Piece TCG - History Dashboard</h1>
            <p>Sign in to access your tournament history</p>
        </div>

        <!-- Google -->
        <a href="https://bandai-auth.rdgosmartins.workers.dev/auth/google" class="btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </a>

        <div class="auth-divider">or</div>

        <!-- Login form -->
        <form class="auth-form" id="loginForm">
            <input type="email" id="loginEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="loginPassword" placeholder="Password" required autocomplete="current-password">
            <button type="submit" class="btn-primary">Sign In</button>
        </form>

        <p class="auth-switch">
            Don't have an account? <a id="switchToRegister">Register</a>
        </p>

        <!-- Register form (hidden) -->
        <form class="auth-form" id="registerForm" style="display:none">
            <input type="text" id="regName" placeholder="Display Name" required>
            <input type="email" id="regEmail" placeholder="Email" required autocomplete="email">
            <input type="password" id="regPassword" placeholder="Password (min 8 characters)" required autocomplete="new-password">
            <button type="submit" class="btn-primary">Create Account</button>
        </form>

        <p class="auth-switch" id="switchToLoginWrap" style="display:none">
            Already have an account? <a id="switchToLogin">Sign In</a>
        </p>

        <div class="auth-message" id="authMessage"></div>
    </div>
</div>

<script>
const AUTH_BASE = 'https://bandai-auth.rdgosmartins.workers.dev';

function showMessage(text, type = 'error') {
    const el = document.getElementById('authMessage');
    el.textContent = text;
    el.className = `auth-message ${type}`;
}

// Check for error params
const params = new URLSearchParams(location.search);
if (params.get('error') === 'rejected')
    showMessage('Your account access has been rejected. Contact the admin for details.', 'error');
else if (params.get('error') === 'google_denied')
    showMessage('Google sign-in was cancelled.', 'error');
else if (params.get('error'))
    showMessage('Google sign-in failed. Please try again.', 'error');

// Login
document.getElementById('loginForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Signing in…';
    btn.disabled = true;
    try {
        const res = await fetch(`${AUTH_BASE}/auth/login`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email:    document.getElementById('loginEmail').value,
                password: document.getElementById('loginPassword').value,
            }),
        });
        const data = await res.json();
        if (res.ok) {
            window.location.href = data.role === 'admin' ? '/admin.html' : '/analyzer.html';
        } else {
            showMessage(data.error || 'Login failed.');
        }
    } catch {
        showMessage('Network error. Please try again.');
    }
    btn.textContent = 'Sign In';
    btn.disabled = false;
});

// Register
document.getElementById('registerForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.textContent = 'Creating account…';
    btn.disabled = true;
    try {
        const res = await fetch(`${AUTH_BASE}/auth/register`, {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                email:       document.getElementById('regEmail').value,
                password:    document.getElementById('regPassword').value,
                displayName: document.getElementById('regName').value,
            }),
        });
        const data = await res.json();
        if (res.ok) {
            showMessage('Account created! Awaiting admin approval before you can sign in.', 'success');
            document.getElementById('registerForm').reset();
        } else {
            showMessage(data.error || 'Registration failed.');
        }
    } catch {
        showMessage('Network error. Please try again.');
    }
    btn.textContent = 'Create Account';
    btn.disabled = false;
});

// Toggle forms
document.getElementById('switchToRegister').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('switchToLoginWrap').style.display = '';
    document.getElementById('registerForm').style.display = '';
    document.querySelector('.auth-switch:not(#switchToLoginWrap)').style.display = 'none';
    document.getElementById('authMessage').className = 'auth-message';
});

document.getElementById('switchToLogin').addEventListener('click', e => {
    e.preventDefault();
    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('switchToLoginWrap').style.display = 'none';
    document.getElementById('loginForm').style.display = '';
    document.querySelector('.auth-switch:not(#switchToLoginWrap)').style.display = '';
    document.getElementById('authMessage').className = 'auth-message';
});
</script>
</body>
</html>
