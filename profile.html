<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — [YOKO] One Piece TCG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <script src="js/auth.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            min-height: 100vh;
            background: var(--bg, #f0f4f8);
            color: var(--text, #1a1a2e);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 14px;
        }

        /* ── Header ─────────────────────────────────────────── */
        .pg-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.75rem 2rem;
            background: var(--card, #fff);
            border-bottom: 1px solid var(--border, #dee2e6);
            box-shadow: 0 1px 6px rgba(0,0,0,.06);
            position: sticky; top: 0; z-index: 100;
        }
        .pg-header-left { display: flex; align-items: center; gap: 1rem; }
        .pg-header h1 {
            font-family: 'Cinzel', serif; font-size: 1rem;
            color: var(--gold, #c9a84c); white-space: nowrap;
        }
        .btn-back {
            display: flex; align-items: center; gap: .4rem;
            color: var(--accent, #048A81); text-decoration: none;
            font-weight: 600; font-size: .85rem; transition: opacity .15s;
        }
        .btn-back:hover { opacity: .7; }
        .btn-signout {
            background: none; border: 1px solid var(--border, #dee2e6);
            color: var(--muted, #6c757d); padding: .35rem .85rem; border-radius: 8px;
            cursor: pointer; font-size: .82rem; transition: all .15s;
        }
        .btn-signout:hover { border-color: var(--loss, #dc3545); color: var(--loss, #dc3545); }

        /* ── Layout ─────────────────────────────────────────── */
        .pg-main {
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 1.5rem;
            max-width: 980px;
            margin: 2rem auto;
            padding: 0 1.25rem 3rem;
        }
        @media (max-width: 720px) {
            .pg-main { grid-template-columns: 1fr; }
            .pg-header { padding: .75rem 1rem; }
        }

        /* ── Sidebar ─────────────────────────────────────────── */
        .sidebar { display: flex; flex-direction: column; gap: 1rem; }

        .avatar-card {
            background: var(--card, #fff);
            border-radius: 16px;
            padding: 1.75rem 1.25rem;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            border: 1px solid var(--border, #dee2e6);
        }
        .avatar-ring {
            width: 80px; height: 80px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent,#048A81), var(--gold,#c9a84c));
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            font-family: 'Cinzel', serif;
            font-size: 1.6rem; font-weight: 700; color: #fff;
            box-shadow: 0 4px 14px rgba(4,138,129,.25);
            position: relative; overflow: hidden; cursor: pointer;
        }
        .avatar-ring img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; }
        .avatar-edit-overlay {
            position: absolute; inset: 0; border-radius: 50%;
            background: rgba(0,0,0,.45);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity .2s;
            font-size: .7rem; color: #fff; font-family: 'Segoe UI', sans-serif; font-weight: 600;
            pointer-events: none; flex-direction: column; gap: 2px;
        }
        .avatar-ring:hover .avatar-edit-overlay { opacity: 1; }
        .avatar-edit-overlay svg { width: 18px; height: 18px; fill: #fff; }
        /* In view mode, don't show edit overlay */
        .view-mode .avatar-ring { cursor: default; }
        .view-mode .avatar-edit-overlay { display: none; }
        .view-mode .save-bar { display: none; }
        .view-mode .field input,
        .view-mode .field textarea,
        .view-mode .field select,
        .view-mode .social-field input { pointer-events: none; background: transparent; border-color: transparent; }
        .view-mode .section-card { border-style: dashed; }
        .avatar-name {
            font-family: 'Cinzel', serif; font-size: 1rem;
            font-weight: 700; margin-bottom: .25rem;
        }
        .avatar-email { font-size: .78rem; color: var(--muted, #6c757d); }

        .leader-card {
            background: var(--card, #fff);
            border-radius: 16px;
            padding: 1.25rem;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            border: 1px solid var(--border, #dee2e6);
        }
        .leader-card-label {
            font-size: .7rem; text-transform: uppercase; letter-spacing: .08em;
            color: var(--muted, #6c757d); margin-bottom: .75rem;
        }
        .leader-img-wrap {
            position: relative; width: 120px; margin: 0 auto .75rem;
        }
        .leader-img-wrap img {
            width: 120px; border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,.18);
            display: block;
            transition: opacity .3s;
        }
        .leader-placeholder {
            width: 120px; height: 168px; border-radius: 8px;
            background: var(--bg, #f0f4f8);
            border: 2px dashed var(--border, #dee2e6);
            display: flex; align-items: center; justify-content: center;
            color: var(--muted, #6c757d); font-size: .75rem;
            text-align: center; line-height: 1.4;
            margin: 0 auto .75rem;
        }
        .leader-name-badge {
            font-size: .8rem; font-weight: 600;
            color: var(--text, #1a1a2e);
            line-height: 1.3;
        }
        .leader-id-badge {
            display: inline-block; margin-top: .3rem;
            font-size: .7rem; font-family: monospace;
            padding: .15rem .5rem; border-radius: 20px;
            background: var(--bg, #f0f4f8);
            color: var(--muted, #6c757d);
            border: 1px solid var(--border, #dee2e6);
        }
        .color-pills { display: flex; justify-content: center; gap: .3rem; margin-top: .5rem; flex-wrap: wrap; }
        .color-pill {
            font-size: .65rem; padding: .1rem .45rem; border-radius: 20px;
            font-weight: 600; letter-spacing: .03em;
        }
        .pill-red    { background: #fde8e8; color: #c0392b; }
        .pill-green  { background: #e8f8ee; color: #1e8449; }
        .pill-blue   { background: #e8f0fd; color: #1a5276; }
        .pill-purple { background: #f3e8fd; color: #6c3483; }
        .pill-black  { background: #e8e8e8; color: #222; }
        .pill-yellow { background: #fef9e7; color: #9a7d0a; }

        /* ── Sections ─────────────────────────────────────────── */
        .sections { display: flex; flex-direction: column; gap: 1.25rem; }

        .section-card {
            background: var(--card, #fff);
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.07);
            border: 1px solid var(--border, #dee2e6);
        }
        .section-title {
            display: flex; align-items: center; gap: .6rem;
            font-family: 'Cinzel', serif; font-size: .9rem;
            color: var(--accent, #048A81);
            margin-bottom: 1.25rem;
            padding-bottom: .6rem;
            border-bottom: 1px solid var(--border, #dee2e6);
        }
        .section-icon { font-size: 1rem; }

        /* ── Form fields ─────────────────────────────────────── */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
        .form-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
        .form-full { grid-column: 1 / -1; }
        @media (max-width: 500px) { .form-grid, .form-grid.cols-3 { grid-template-columns: 1fr; } }

        .field { display: flex; flex-direction: column; gap: .3rem; }
        .field label {
            font-size: .72rem; font-weight: 600; text-transform: uppercase;
            letter-spacing: .06em; color: var(--muted, #6c757d);
        }
        .field-wrap { position: relative; }
        .field-icon {
            position: absolute; left: .7rem; top: 50%; transform: translateY(-50%);
            font-size: .95rem; pointer-events: none; opacity: .5;
            line-height: 1;
        }
        .field-wrap.has-icon input,
        .field-wrap.has-icon select { padding-left: 2.1rem; }

        .field input,
        .field textarea,
        .field select {
            width: 100%;
            background: var(--bg, #f0f4f8);
            border: 1px solid var(--border, #dee2e6);
            border-radius: 9px;
            color: var(--text, #1a1a2e);
            font-size: .875rem;
            padding: .55rem .8rem;
            transition: border-color .2s, box-shadow .2s;
            font-family: inherit;
            appearance: none;
        }
        .field input:focus,
        .field textarea:focus,
        .field select:focus {
            outline: none;
            border-color: var(--accent, #048A81);
            box-shadow: 0 0 0 3px rgba(4,138,129,.1);
        }
        .field textarea { resize: vertical; min-height: 90px; }
        .field select { cursor: pointer; }
        .field select option { background: var(--card, #fff); }
        .field select optgroup { font-style: normal; font-weight: 700; }

        /* ── Social fields ─────────────────────────────────────── */
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .85rem; }
        @media (max-width: 500px) { .social-grid { grid-template-columns: 1fr; } }

        .social-field { display: flex; flex-direction: column; gap: .3rem; }
        .social-label { display: flex; align-items: center; gap: .4rem; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--muted, #6c757d); }
        .social-icon { width: 16px; height: 16px; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .si-instagram { background: linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
        .si-twitter   { background: #000; }
        .si-discord   { background: #5865F2; }
        .si-whatsapp  { background: #25D366; }
        .si-youtube   { background: #FF0000; }
        .si-twitch    { background: #9146FF; }
        .social-icon svg { width: 10px; height: 10px; fill: #fff; }

        .social-field input {
            width: 100%; background: var(--bg, #f0f4f8);
            border: 1px solid var(--border, #dee2e6); border-radius: 9px;
            color: var(--text, #1a1a2e); font-size: .875rem;
            padding: .55rem .8rem; transition: border-color .2s, box-shadow .2s;
            font-family: inherit;
        }
        .social-field input:focus { outline: none; border-color: var(--accent, #048A81); box-shadow: 0 0 0 3px rgba(4,138,129,.1); }

        /* ── Save bar ─────────────────────────────────────────── */
        .save-bar {
            display: flex; align-items: center; gap: 1rem;
            justify-content: flex-end;
        }
        .btn-save {
            padding: .65rem 2rem; border: none; border-radius: 10px;
            background: var(--accent, #048A81); color: #fff;
            font-weight: 700; font-size: .95rem; cursor: pointer;
            transition: opacity .2s, transform .1s;
            box-shadow: 0 3px 10px rgba(4,138,129,.3);
        }
        .btn-save:hover { opacity: .88; transform: translateY(-1px); }
        .btn-save:active { transform: translateY(0); }
        .btn-save:disabled { opacity: .5; cursor: not-allowed; transform: none; }
        .save-status { font-size: .85rem; min-width: 140px; text-align: right; }
        .save-status.ok   { color: var(--win, #28a745); }
        .save-status.err  { color: var(--loss, #dc3545); }
        .save-status.wait { color: var(--muted, #6c757d); }

        /* Dark mode enhancements */
        [data-theme="dark"] .field input,
        [data-theme="dark"] .field textarea,
        [data-theme="dark"] .field select,
        [data-theme="dark"] .social-field input { background: #1a2535; border-color: #2a3a50; color: var(--text); }
        [data-theme="dark"] .leader-placeholder { background: #1a2535; border-color: #2a3a50; }
        [data-theme="dark"] .leader-id-badge { background: #1a2535; border-color: #2a3a50; }
        [data-theme="dark"] .pill-red    { background: #3d1515; color: #f1948a; }
        [data-theme="dark"] .pill-green  { background: #0d2e18; color: #82e0a0; }
        [data-theme="dark"] .pill-blue   { background: #0d1e35; color: #7fb3e8; }
        [data-theme="dark"] .pill-purple { background: #1e0d35; color: #c39bd3; }
        [data-theme="dark"] .pill-black  { background: #252525; color: #aaa; }
        [data-theme="dark"] .pill-yellow { background: #2e2800; color: #f5d060; }
    </style>
</head>
<body>

<header class="pg-header">
    <div class="pg-header-left">
        <a href="/analyzer.html" class="btn-back">&#8592; Dashboard</a>
        <h1>&#9760;&#65039; [YOKO] One Piece TCG</h1>
    </div>
    <button class="btn-signout" onclick="logout()">Sign Out</button>
</header>

<main class="pg-main">

    <!-- ── Sidebar ───────────────────────────── -->
    <aside class="sidebar">

        <div class="avatar-card">
            <label for="avatarFileInput" id="avatarRingLabel" style="display:contents;cursor:pointer;">
                <input type="file" id="avatarFileInput" accept="image/*" style="display:none" onchange="onAvatarFile(event)">
                <div class="avatar-ring" id="avatarRing">
                    <span id="avatarInitials">?</span>
                    <div class="avatar-edit-overlay">
                        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                        Edit
                    </div>
                </div>
            </label>
            <div class="avatar-name" id="avatarName">Loading…</div>
            <div class="avatar-email" id="avatarEmail"></div>
        </div>

        <div class="leader-card">
            <div class="leader-card-label">Favorite Leader</div>
            <div id="leaderPreviewWrap">
                <div class="leader-placeholder" id="leaderPlaceholder">Select a leader<br>to preview</div>
                <img id="leaderImg" src="" alt="" style="display:none; width:120px; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.18); margin:0 auto .75rem; display:none;">
            </div>
            <div class="leader-name-badge" id="leaderNameBadge">—</div>
            <div class="leader-id-badge" id="leaderIdBadge" style="display:none"></div>
            <div class="color-pills" id="leaderColorPills"></div>
        </div>

    </aside>

    <!-- ── Sections ───────────────────────────── -->
    <div class="sections">

        <!-- Personal Info -->
        <div class="section-card">
            <div class="section-title">
                <span class="section-icon">&#128100;</span> Personal Info
            </div>
            <div class="form-grid">
                <div class="field">
                    <label>Display Name</label>
                    <div class="field-wrap">
                        <input type="text" id="displayName" placeholder="Your name" maxlength="64">
                    </div>
                </div>
                <div class="field">
                    <label>Age</label>
                    <div class="field-wrap">
                        <input type="number" id="age" placeholder="e.g. 25" min="1" max="120">
                    </div>
                </div>
                <div class="field form-full">
                    <label>City</label>
                    <div class="field-wrap">
                        <input type="text" id="city" placeholder="e.g. São Paulo, BR" maxlength="128">
                    </div>
                </div>
                <div class="field form-full">
                    <label>Bio</label>
                    <textarea id="bio" placeholder="A little about yourself…" maxlength="512"></textarea>
                </div>
            </div>
        </div>

        <!-- TCG Info -->
        <div class="section-card">
            <div class="section-title">
                <span class="section-icon">&#9878;</span> TCG Info
            </div>
            <div class="form-grid">
                <div class="field">
                    <label>Bandai Username</label>
                    <div class="field-wrap">
                        <input type="text" id="bandaiName" placeholder="Name in Bandai system" maxlength="64">
                    </div>
                </div>
                <div class="field">
                    <label>Years Playing OPTCG</label>
                    <div class="field-wrap">
                        <input type="number" id="yearsPlaying" placeholder="e.g. 2" min="0" max="20">
                    </div>
                </div>
                <div class="field form-full">
                    <label>Playstyle</label>
                    <div class="field-wrap">
                        <input type="text" id="playstyle" placeholder="e.g. Aggro, Control, Midrange…" maxlength="64">
                    </div>
                </div>
                <div class="field form-full">
                    <label>Favorite Leader / Deck</label>
                    <select id="favoriteDeck" onchange="onLeaderChange(this.value)">
                        <option value="">— Select a leader —</option>

                        <optgroup label="OP-01 · Romance Dawn">
                            <option value="OP01-001">Roronoa Zoro — OP01-001 (Red)</option>
                            <option value="OP01-002">Trafalgar Law — OP01-002 (Green/Red)</option>
                            <option value="OP01-003">Monkey D. Luffy — OP01-003 (Green/Red)</option>
                            <option value="OP01-031">Kouzuki Oden — OP01-031 (Green)</option>
                            <option value="OP01-060">Donquixote Doflamingo — OP01-060 (Blue)</option>
                            <option value="OP01-061">Kaido — OP01-061 (Blue/Purple)</option>
                            <option value="OP01-062">Crocodile — OP01-062 (Blue/Purple)</option>
                            <option value="OP01-091">King — OP01-091 (Purple)</option>
                        </optgroup>

                        <optgroup label="OP-02 · Paramount War">
                            <option value="OP02-001">Edward Newgate — OP02-001 (Red)</option>
                            <option value="OP02-002">Monkey D. Garp — OP02-002 (Red/Black)</option>
                            <option value="OP02-025">Kin'emon — OP02-025 (Green)</option>
                            <option value="OP02-026">Sanji — OP02-026 (Blue/Green)</option>
                            <option value="OP02-049">Emporio Ivankov — OP02-049 (Blue)</option>
                            <option value="OP02-071">Magellan — OP02-071 (Purple)</option>
                            <option value="OP02-072">Zephyr — OP02-072 (Purple/Black)</option>
                            <option value="OP02-093">Smoker — OP02-093 (Black)</option>
                        </optgroup>

                        <optgroup label="OP-03 · Pillars of Strength">
                            <option value="OP03-001">Portgas D. Ace — OP03-001 (Red)</option>
                            <option value="OP03-021">Kuro — OP03-021 (Green)</option>
                            <option value="OP03-022">Arlong — OP03-022 (Green/Yellow)</option>
                            <option value="OP03-040">Nami — OP03-040 (Blue)</option>
                            <option value="OP03-058">Iceburg — OP03-058 (Purple)</option>
                            <option value="OP03-076">Rob Lucci — OP03-076 (Black)</option>
                            <option value="OP03-077">Charlotte Linlin — OP03-077 (Yellow/Black)</option>
                            <option value="OP03-099">Charlotte Katakuri — OP03-099 (Yellow)</option>
                        </optgroup>

                        <optgroup label="OP-04 · Kingdoms of Intrigue">
                            <option value="OP04-001">Nefertari Vivi — OP04-001 (Blue/Red)</option>
                            <option value="OP04-019">Donquixote Doflamingo — OP04-019 (Green/Purple)</option>
                            <option value="OP04-020">Issho — OP04-020 (Green/Black)</option>
                            <option value="OP04-039">Rebecca — OP04-039 (Blue/Black)</option>
                            <option value="OP04-040">Queen — OP04-040 (Blue/Yellow)</option>
                            <option value="OP04-058">Crocodile — OP04-058 (Purple/Yellow)</option>
                        </optgroup>

                        <optgroup label="OP-05 · Awakening of the New Era">
                            <option value="OP05-001">Sabo — OP05-001 (Red/Black)</option>
                            <option value="OP05-002">Belo Betty — OP05-002 (Red/Yellow)</option>
                            <option value="OP05-022">Donquixote Rosinante — OP05-022 (Blue/Green)</option>
                            <option value="OP05-041">Sakazuki — OP05-041 (Blue/Black)</option>
                            <option value="OP05-060">Monkey D. Luffy — OP05-060 (Purple)</option>
                            <option value="OP05-098">Enel — OP05-098 (Yellow)</option>
                        </optgroup>

                        <optgroup label="OP-06 · Wings of the Captain">
                            <option value="OP06-001">Uta — OP06-001 (Purple/Red)</option>
                            <option value="OP06-020">Hody Jones — OP06-020 (Green)</option>
                            <option value="OP06-021">Perona — OP06-021 (Green/Black)</option>
                            <option value="OP06-022">Yamato — OP06-022 (Green/Yellow)</option>
                            <option value="OP06-042">Vinsmoke Reiju — OP06-042 (Blue/Purple)</option>
                            <option value="OP06-080">Gecko Moria — OP06-080 (Black)</option>
                        </optgroup>

                        <optgroup label="OP-07 · 500 Years in the Future">
                            <option value="OP07-001">Monkey D. Dragon — OP07-001 (Red)</option>
                            <option value="OP07-019">Jewelry Bonney — OP07-019 (Green)</option>
                            <option value="OP07-038">Boa Hancock — OP07-038 (Blue)</option>
                            <option value="OP07-059">Foxy — OP07-059 (Purple)</option>
                            <option value="OP07-079">Rob Lucci — OP07-079 (Black)</option>
                            <option value="OP07-097">Vegapunk — OP07-097 (Yellow)</option>
                        </optgroup>

                        <optgroup label="OP-08 · Two Legends">
                            <option value="OP08-001">Tony Tony Chopper — OP08-001 (Green/Red)</option>
                            <option value="OP08-002">Marco — OP08-002 (Blue/Red)</option>
                            <option value="OP08-021">Carrot — OP08-021 (Green)</option>
                            <option value="OP08-057">King — OP08-057 (Blue/Purple)</option>
                            <option value="OP08-058">Charlotte Pudding — OP08-058 (Purple/Yellow)</option>
                            <option value="OP08-098">Kalgara — OP08-098 (Yellow)</option>
                        </optgroup>

                        <optgroup label="OP-09 · Emperors in the New World">
                            <option value="OP09-001">Shanks — OP09-001 (Red)</option>
                            <option value="OP09-022">Lim — OP09-022 (Green/Purple)</option>
                            <option value="OP09-042">Buggy — OP09-042 (Blue)</option>
                            <option value="OP09-061">Monkey D. Luffy — OP09-061 (Purple/Black)</option>
                            <option value="OP09-062">Nico Robin — OP09-062 (Purple/Yellow)</option>
                            <option value="OP09-081">Marshall D. Teach — OP09-081 (Black)</option>
                        </optgroup>

                        <optgroup label="OP-10 · Royal Blood">
                            <option value="OP10-001">Smoker — OP10-001 (Green/Red)</option>
                            <option value="OP10-002">Caesar Clown — OP10-002 (Blue/Red)</option>
                            <option value="OP10-003">Sugar — OP10-003 (Purple/Red)</option>

<script>
// Leaders locked per user email (lowercase). These users cannot change their favorite leader.
const LOCKED_LEADERS = {
    'paulogabriel8b@gmail.com': 'OP04-040', // Queen — Blue/Yellow
};

const COLOR_MAP = {
    'red':    'pill-red',    'green':  'pill-green',
    'blue':   'pill-blue',   'purple': 'pill-purple',
    'black':  'pill-black',  'yellow': 'pill-yellow',
};

function onLeaderChange(id) {
    const img     = document.getElementById('leaderImg');
    const ph      = document.getElementById('leaderPlaceholder');
    const nameBadge = document.getElementById('leaderNameBadge');
    const idBadge   = document.getElementById('leaderIdBadge');
    const pills     = document.getElementById('leaderColorPills');

    if (!id) {
        img.style.display = 'none'; ph.style.display = '';
        nameBadge.textContent = '—'; idBadge.style.display = 'none'; pills.innerHTML = '';
        return;
    }

    // Extract name and colors from the selected option text
    const sel = document.getElementById('favoriteDeck');
    const optText = sel.options[sel.selectedIndex].text; // e.g. "Roronoa Zoro — OP01-001 (Red)"
    const nameMatch = optText.match(/^(.+?)\s+—/);
    const colorMatch = optText.match(/\(([^)]+)\)$/);
    const name = nameMatch ? nameMatch[1] : id;
    const colors = colorMatch ? colorMatch[1].split('/') : [];

    nameBadge.textContent = name;
    idBadge.textContent = id; idBadge.style.display = 'inline-block';
    pills.innerHTML = colors.map(c =>
        `<span class="color-pill ${COLOR_MAP[c.toLowerCase().trim()] || ''}">${c.trim()}</span>`
    ).join('');

    ph.style.display = 'none';
    img.style.display = 'block';
    img.style.cssText = 'width:120px;border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.18);margin:0 auto .75rem;display:block;opacity:0;transition:opacity .3s;';
    img.src = `https://optcgapi.com/media/static/Card_Images/${id}.jpg`;
    img.onload  = () => { img.style.opacity = '1'; };
    img.onerror = () => { img.style.display = 'none'; ph.style.display = ''; };
}

let _lockedDeck    = null; // set during init, used in saveProfile()
let _avatarCustom  = null; // base64 data URL of uploaded avatar (null = unchanged)
let _isViewMode    = false;

function setAvatarDisplay(src, initials) {
    const ring = document.getElementById('avatarRing');
    const ini  = document.getElementById('avatarInitials');
    if (src) {
        ini.innerHTML = `<img src="${src}" alt="" style="width:80px;height:80px;border-radius:50%;object-fit:cover;">`;
    } else {
        ini.textContent = initials || '?';
    }
}

function onAvatarFile(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        const img = new Image();
        img.onload = () => {
            const SIZE = 200;
            const canvas = document.createElement('canvas');
            canvas.width = SIZE; canvas.height = SIZE;
            const ctx = canvas.getContext('2d');
            // Center-crop to square
            const min = Math.min(img.width, img.height);
            const sx  = (img.width  - min) / 2;
            const sy  = (img.height - min) / 2;
            ctx.drawImage(img, sx, sy, min, min, 0, 0, SIZE, SIZE);
            _avatarCustom = canvas.toDataURL('image/jpeg', 0.78);
            setAvatarDisplay(_avatarCustom, null);
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
    // Reset input so same file can be picked again
    event.target.value = '';
}

(async () => {
    const user = await requireAuth();
    if (!user) return;

    // Check view mode (?view=BandaiName)
    const viewName = new URLSearchParams(window.location.search).get('view');
    _isViewMode = !!viewName;

    if (_isViewMode) {
        document.querySelector('main').classList.add('view-mode');
        document.querySelector('.pg-header h1').textContent = viewName + "'s Profile";
        document.getElementById('avatarFileInput').disabled = true;
        document.getElementById('avatarRingLabel').style.pointerEvents = 'none';
        document.getElementById('avatarRingLabel').style.cursor = 'default';
    }

    // Locked leader by email (only applies in edit mode)
    _lockedDeck = _isViewMode ? null : (LOCKED_LEADERS[(user.email || '').toLowerCase()] || null);

    const url = _isViewMode
        ? AUTH_BASE + '/profile/by-name/' + encodeURIComponent(viewName)
        : AUTH_BASE + '/profile';

    try {
        const r = await fetch(url, { credentials: 'include' });
        if (!r.ok) return;
        const data = await r.json();
        const p = _isViewMode ? data : (data.profile || {});

        const displayName = _isViewMode ? (p.displayName || viewName) : (p.displayName || user.displayName || '');
        const email       = _isViewMode ? '' : (user.email || '');
        const avatarSrc   = _isViewMode ? p.avatarUrl : (p.avatarCustom || user.avatarUrl || null);
        const initials    = displayName.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase() || '?';

        setAvatarDisplay(avatarSrc, initials);
        document.getElementById('avatarName').textContent  = displayName || '—';
        document.getElementById('avatarEmail').textContent = email;

        if (!_isViewMode) document.getElementById('displayName').value = displayName;
        document.getElementById('age').value          = p.age          || '';
        document.getElementById('city').value         = p.city         || '';
        document.getElementById('bio').value          = p.bio          || '';
        document.getElementById('bandaiName').value   = p.bandaiName   || '';
        document.getElementById('yearsPlaying').value = p.yearsPlaying || '';
        document.getElementById('playstyle').value    = p.playstyle    || '';
        document.getElementById('instagram').value    = p.instagram    || '';
        document.getElementById('twitter').value      = p.twitter      || '';
        document.getElementById('discord').value      = p.discord      || '';
        document.getElementById('whatsapp').value     = p.whatsapp     || '';
        document.getElementById('youtube').value      = p.youtube      || '';
        document.getElementById('twitch').value       = p.twitch       || '';

        const lockedDeck = _lockedDeck;
        const deckValue  = lockedDeck || p.favoriteDeck || '';
        if (deckValue) {
            document.getElementById('favoriteDeck').value = deckValue;
            onLeaderChange(deckValue);
        }
        if (lockedDeck) {
            const sel = document.getElementById('favoriteDeck');
            sel.disabled = true;
            sel.title = 'Your favorite leader is set by the team and cannot be changed.';
        }
    } catch(e) {}
})();
async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('saveStatus');
    btn.disabled = true;
    status.textContent = 'Saving…'; status.className = 'save-status wait';

    const bandaiName  = document.getElementById('bandaiName').value.trim();
    const payload = {
        avatarCustom: _avatarCustom, // null means unchanged; empty string means remove
        displayName:  document.getElementById('displayName').value.trim(),
        age:          document.getElementById('age').value,
        city:         document.getElementById('city').value.trim(),
        bio:          document.getElementById('bio').value.trim(),
        bandaiName,
        favoriteDeck: _lockedDeck || document.getElementById('favoriteDeck').value,
        playstyle:    document.getElementById('playstyle').value.trim(),
        yearsPlaying: document.getElementById('yearsPlaying').value,
        instagram:    document.getElementById('instagram').value.trim(),
        twitter:      document.getElementById('twitter').value.trim(),
        discord:      document.getElementById('discord').value.trim(),
        whatsapp:     document.getElementById('whatsapp').value.trim(),
        youtube:      document.getElementById('youtube').value.trim(),
        twitch:       document.getElementById('twitch').value.trim(),
    };

    try {
        const r = await fetch(`${AUTH_BASE}/profile`, {
            method: 'PUT', credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        if (r.ok) {
            status.textContent = 'Changes saved!'; status.className = 'save-status ok';
            if (_avatarCustom) _avatarCustom = null; // committed — no longer "pending"
            if (payload.displayName) {
                document.getElementById('avatarName').textContent = payload.displayName;
            }
        } else {
            const err = await r.json().catch(()=>({}));
            status.textContent = 'Error: ' + (err.error || r.status); status.className = 'save-status err';
        }
    } catch(e) {
        status.textContent = 'Network error.'; status.className = 'save-status err';
    } finally {
        btn.disabled = false;
        setTimeout(() => { status.textContent = ''; status.className = 'save-status'; }, 4000);
    }
}
</script>
