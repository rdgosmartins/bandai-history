        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        .form-group label { font-size: .78rem; opacity: .7; text-transform: uppercase; letter-spacing: .04em; }

            border: 1px solid rgba(255,255,255,.12);
            border-radius: 8px;

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus { outline: none; border-color: var(--accent, #c9a84c); }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

        .btn-save {

        .btn-save:hover { opacity: .85; }

        .profile-status { text-align: center; font-size: .85rem; margin-top: .6rem; min-height: 1.2em; }
        .profile-status.ok { color: #4caf50; }
        .profile-status.err { color: #e05252; }
        .back-link { display: block; text-align: center; margin-top: 1.2rem; opacity: .6; font-size: .85rem; text-decoration: none; }
        .back-link:hover { opacity: 1; }
        .color-dot {
            display: inline-block; width: 8px; height: 8px; border-radius: 50%;
            margin-right: 4px; vertical-align: middle;
        }

<script>
const AUTH_BASE = 'https://bandai-auth.rdgosmartins.workers.dev';

(async () => {
    const user = await requireAuth();
    if (!user) return;
    // Pre-fill from server
    try {
        const r = await fetch(`${AUTH_BASE}/profile`, { credentials: 'include' });
        if (r.ok) {
            const { profile } = await r.json();
            const p = profile || {};
            document.getElementById('displayName').value  = user.displayName || '';
            document.getElementById('age').value          = p.age          || '';
            document.getElementById('city').value         = p.city         || '';
            document.getElementById('bio').value          = p.bio          || '';
            document.getElementById('bandaiName').value   = p.bandaiName   || '';
            document.getElementById('yearsPlaying').value = p.yearsPlaying || '';
            document.getElementById('playstyle').value    = p.playstyle    || '';
            document.getElementById('instagram').value    = p.instagram    || '';
            document.getElementById('twitter').value      = p.twitter      || '';
            document.getElementById('discord').value      = p.discord      || '';
            document.getElementById('whatsapp').value     = p.whatsapp     || '';
            document.getElementById('youtube').value      = p.youtube      || '';
            document.getElementById('twitch').value       = p.twitch       || '';
            if (p.favoriteDeck) document.getElementById('favoriteDeck').value = p.favoriteDeck;
        }
    } catch(e) {}
})();

async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    const status = document.getElementById('profileStatus');
    btn.disabled = true;
    status.textContent = 'Saving…';
    status.className = 'profile-status';

    const payload = {
        displayName:  document.getElementById('displayName').value.trim(),
        age:          document.getElementById('age').value,
        city:         document.getElementById('city').value.trim(),
        bio:          document.getElementById('bio').value.trim(),
        bandaiName:   document.getElementById('bandaiName').value.trim(),
        favoriteDeck: document.getElementById('favoriteDeck').value,
        playstyle:    document.getElementById('playstyle').value.trim(),
        yearsPlaying: document.getElementById('yearsPlaying').value,
        instagram:    document.getElementById('instagram').value.trim(),
        twitter:      document.getElementById('twitter').value.trim(),
        discord:      document.getElementById('discord').value.trim(),
        whatsapp:     document.getElementById('whatsapp').value.trim(),
        youtube:      document.getElementById('youtube').value.trim(),
        twitch:       document.getElementById('twitch').value.trim(),
    };

    try {
        const r = await fetch(`${AUTH_BASE}/profile`, {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
        });
        if (r.ok) {
            status.textContent = 'Profile saved!';
            status.className = 'profile-status ok';
        } else {
            const err = await r.json().catch(() => ({}));
            status.textContent = 'Error: ' + (err.error || r.status);
            status.className = 'profile-status err';
        }
    } catch(e) {
        status.textContent = 'Network error — try again.';
        status.className = 'profile-status err';
    } finally {
        btn.disabled = false;
        setTimeout(() => { status.textContent = ''; }, 4000);
    }
}
</script>
