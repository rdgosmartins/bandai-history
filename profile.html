<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — [YOKO] One Piece TCG - History Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="js/constants.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let currentUser;
        (async () => {
            currentUser = await requireAuth();
            if (!currentUser) return;
            document.getElementById('headerName').textContent = currentUser.displayName || currentUser.email;
            loadProfile();
        })();
    </script>
</head>
<body class="profile-body">
<div class="profile-container">

    <div class="profile-header">
        <h1>&#128100; My Profile</h1>
        <a href="/analyzer.html" style="font-size:0.85rem;color:var(--primary,#048A81);font-weight:600;text-decoration:none;">&#9875; Dashboard →</a>
        <div style="display:flex;align-items:center;gap:1rem;">
            <span style="font-size:0.85rem;color:var(--text-muted,#888)">
                Signed in as <strong id="headerName">…</strong>
            </span>
            <button class="btn-logout" onclick="logout()">Sign Out</button>
        </div>
    </div>

    <!-- Account info (read-only) -->
    <div class="profile-card">
        <h2>&#128274; Account</h2>
        <div class="profile-grid">
            <div class="profile-field">
                <label>Display Name</label>
                <input type="text" id="accDisplayName" readonly style="opacity:0.6;cursor:not-allowed;">
            </div>
            <div class="profile-field">
                <label>Email</label>
                <input type="text" id="accEmail" readonly style="opacity:0.6;cursor:not-allowed;">
            </div>
        </div>
        <p class="profile-hint" style="margin-top:0.75rem;">Account details are managed via Google or your login method.</p>
    </div>

    <!-- Personal info -->
    <div class="profile-card">
        <h2>&#128101; Personal</h2>
        <div class="profile-grid">
            <div class="profile-field">
                <label>Age</label>
                <input type="number" id="age" min="1" max="99" placeholder="e.g. 25">
            </div>
            <div class="profile-field">
                <label>City</label>
                <input type="text" id="city" placeholder="e.g. São Paulo">
            </div>
            <div class="profile-field full">
                <label>Bio</label>
                <textarea id="bio" placeholder="Tell a bit about yourself…"></textarea>
            </div>
            <div class="profile-field">
                <label>Favorite One Piece Character</label>
                <input type="text" id="favoriteCharacter" placeholder="e.g. Luffy">
            </div>
        </div>
    </div>

    <!-- TCG info -->
    <div class="profile-card">
        <h2>&#127354; TCG</h2>
        <div class="profile-grid">
            <div class="profile-field">
                <label>Bandai Name (in-game)</label>
                <select id="bandaiName">
                    <option value="">— select your player —</option>
                </select>
            </div>
            <div class="profile-field">
                <label>Years Playing</label>
                <input type="number" id="yearsPlaying" min="0" max="20" placeholder="e.g. 2">
            </div>
            <div class="profile-field">
                <label>Favorite Deck</label>
                <input type="text" id="favoriteDeck" placeholder="e.g. Luffy / Vermelho">
            </div>
            <div class="profile-field">
                <label>Playstyle</label>
                <select id="playstyle">
                    <option value="">— select —</option>
                    <option value="competitive">Competitive</option>
                    <option value="casual">Casual</option>
                    <option value="collector">Collector</option>
                    <option value="streamer">Streamer / Content Creator</option>
                </select>
            </div>
            <div class="profile-field">
                <label>Favorite Leader right now</label>
                <input type="text" id="favoriteLeader" placeholder="e.g. OP09 Luffy">
            </div>
            <div class="profile-field">
                <label>Preferred Deck Color</label>
                <select id="deckColor">
                    <option value="">— select —</option>
                    <option value="red">Red</option>
                    <option value="green">Green</option>
                    <option value="blue">Blue</option>
                    <option value="purple">Purple</option>
                    <option value="black">Black</option>
                    <option value="yellow">Yellow</option>
                    <option value="multi">Multi-color</option>
                </select>
            </div>
            <div class="profile-field full">
                <label>Biggest Achievement</label>
                <input type="text" id="biggestAchievement" placeholder="e.g. Top 8 Regional 2025">
            </div>
            <div class="profile-field full">
                <div class="profile-toggle-row">
                    <input type="checkbox" id="availableForTraining">
                    <label for="availableForTraining">Available for training sessions</label>
                </div>
            </div>
        </div>
    </div>

    <!-- Social links -->
    <div class="profile-card">
        <h2>&#127760; Social</h2>
        <div class="profile-grid">
            <div class="profile-field">
                <label>Instagram</label>
                <input type="text" id="instagram" placeholder="@username">
            </div>
            <div class="profile-field">
                <label>Twitter / X</label>
                <input type="text" id="twitter" placeholder="@username">
            </div>
            <div class="profile-field">
                <label>Discord</label>
                <input type="text" id="discord" placeholder="username">
            </div>
            <div class="profile-field">
                <label>WhatsApp</label>
                <input type="text" id="whatsapp" placeholder="+55 11 91234-5678">
            </div>
            <div class="profile-field">
                <label>YouTube</label>
                <input type="text" id="youtube" placeholder="channel URL or @handle">
            </div>
            <div class="profile-field">
                <label>Twitch</label>
                <input type="text" id="twitch" placeholder="twitch.tv/username">
            </div>
        </div>
    </div>

    <!-- Save -->
    <div class="profile-card" style="padding:1.25rem 2rem;">
        <div class="profile-save-row">
            <button class="btn-primary" id="saveBtn" onclick="saveProfile()">&#128190; Save Profile</button>
            <div class="auth-message" id="saveMessage" style="margin:0;flex:1;"></div>
        </div>
    </div>

</div>

<script>
function populateBandaiSelect() {
    const sel = document.getElementById('bandaiName');
    // Parse PLAYERS_MAP using the same format: Name:ID or Name:ID:Token
    const lines = PLAYERS_MAP.trim().split('\n');
    for (const line of lines) {
        const parts = line.trim().split(':');
        if (parts.length >= 2) {
            const opt = document.createElement('option');
            opt.value = parts[0];
            opt.textContent = parts[0].replace(/_/g, ' ');
            sel.appendChild(opt);
        }
    }
}

async function loadProfile() {
    try {
        populateBandaiSelect();

        // Fill read-only account fields
        document.getElementById('accDisplayName').value = currentUser.displayName || '';
        document.getElementById('accEmail').value = currentUser.email || '';

        // Fetch profile data
        const res = await fetch(`${AUTH_BASE}/profile`, { credentials: 'include' });
        if (!res.ok) return;
        const p = await res.json();

        const fields = ['bandaiName','age','city','bio','favoriteDeck','playstyle','yearsPlaying',
                        'favoriteLeader','biggestAchievement','deckColor','instagram','twitter',
                        'discord','whatsapp','youtube','twitch','favoriteCharacter'];
        for (const f of fields) {
            const el = document.getElementById(f);
            if (el && p[f] != null) el.value = p[f];
        }
        if (p.availableForTraining != null) {
            document.getElementById('availableForTraining').checked = !!p.availableForTraining;
        }
    } catch (e) {
        console.error('Failed to load profile', e);
    }
}

async function saveProfile() {
    const btn = document.getElementById('saveBtn');
    const msg = document.getElementById('saveMessage');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const fields = ['bandaiName','age','city','bio','favoriteDeck','playstyle','yearsPlaying',
                    'favoriteLeader','biggestAchievement','deckColor','instagram','twitter',
                    'discord','whatsapp','youtube','twitch','favoriteCharacter'];
    const body = {};
    for (const f of fields) {
        const el = document.getElementById(f);
        if (el) body[f] = el.value;
    }
    body.availableForTraining = document.getElementById('availableForTraining').checked;

    try {
        const res = await fetch(`${AUTH_BASE}/profile`, {
            method: 'PUT',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        if (res.ok) {
            msg.textContent = 'Profile saved!';
            msg.className = 'auth-message success';
            setTimeout(() => { msg.className = 'auth-message'; }, 3000);
        } else {
            const d = await res.json().catch(() => ({}));
            msg.textContent = d.error || 'Failed to save.';
            msg.className = 'auth-message error';
        }
    } catch {
        msg.textContent = 'Network error. Please try again.';
        msg.className = 'auth-message error';
    }
    btn.disabled = false;
    btn.textContent = '💾 Save Profile';
}
</script>
</body>
</html>
